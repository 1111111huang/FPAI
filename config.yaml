# FPAI Global Configuration
project_name: "FPAI-Football-Predictor"
version: "1.0.0"

paths:
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  database_path: "data/fpai_core.db"

leagues:
  - name: "Premier League"
    code: "E0"
    country: "England"

# Prototype 1 Settings
settings:
  rolling_window: 5
  min_matches_required: 10
  test_size: 0.2
  initial_bankroll: 1000

scraper:
  league_page_url: "https://www.football-data.co.uk/englandm.php"
  limit_seasons: 10
  timeout_seconds: 30
  leagues: ["E0"]
  start_year: 2015
